apiVersion: v1
kind: Namespace
metadata:
  name: cloudscope
---
apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: cloudscope-agent
  namespace: cloudscope
  labels:
    app.kubernetes.io/name: cloudscope
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: agent
spec:
  description: "AI-powered cloud-native learning assistant using MCP"
  systemPrompt: |
    You are CloudScope, an expert cloud-native assistant.
    Always be specific, practical, and include working examples.
    When generating YAML, add comments. When debugging, suggest prevention.
  model:
    apiGroup: "llm.k8s-ai.dev"
    name: "claude-3-5-sonnet"
  tools:
    - name: cloudscope-mcp-server
      type: McpServer
      mcpServer:
        url: "http://cloudscope-mcp-service:8000/mcp"
        transport: http
  memory:
    enabled: true
    maxTokens: 4096
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudscope-mcp-server
  namespace: cloudscope
  labels:
    app.kubernetes.io/name: cloudscope-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudscope-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudscope-mcp-server
    spec:
      containers:
        - name: server
          image: ghcr.io/cloudscope/cloudscope-mcp:1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - mcp_server/server.py
            - --transport
            - http
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: cloudscope-mcp-service
  namespace: cloudscope
  labels:
    app.kubernetes.io/name: cloudscope-mcp-server
spec:
  selector:
    app.kubernetes.io/name: cloudscope-mcp-server
  ports:
    - name: http
      port: 8000
      targetPort: http
